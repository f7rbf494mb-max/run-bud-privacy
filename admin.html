<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RunBud Admin</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0B1020;
      --surface: #141A2E;
      --surface2: #1C2540;
      --border: rgba(255,255,255,0.07);
      --purple: #6C63FF;
      --purple-dim: rgba(108,99,255,0.15);
      --gold: #FFD700;
      --gold-dim: rgba(255,215,0,0.12);
      --green: #4ADE80;
      --green-dim: rgba(74,222,128,0.12);
      --red: #FF7A7A;
      --red-dim: rgba(255,122,122,0.12);
      --orange: #FF9A3C;
      --orange-dim: rgba(255,154,60,0.10);
      --text: #FFFFFF;
      --text-dim: #AAB3C5;
      --text-faint: #5A6380;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
    }

    /* ── Login ─────────────────────────────────────────── */
    #login-screen {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }
    .login-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 40px 36px;
      width: 100%;
      max-width: 400px;
      text-align: center;
    }
    .login-card .logo {
      font-size: 32px;
      font-weight: 800;
      background: linear-gradient(135deg, #6C63FF, #9C8FFF);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 8px;
    }
    .login-card .subtitle {
      color: var(--text-dim);
      font-size: 14px;
      margin-bottom: 32px;
    }
    .login-card input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 16px;
      color: var(--text);
      font-size: 15px;
      margin-bottom: 12px;
      outline: none;
      transition: border-color .2s;
    }
    .login-card input:focus { border-color: var(--purple); }
    .btn-primary {
      width: 100%;
      background: var(--purple);
      color: #fff;
      border: none;
      border-radius: 14px;
      padding: 14px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity .2s;
    }
    .btn-primary:hover { opacity: .88; }
    .btn-primary:disabled { opacity: .45; cursor: default; }
    .login-error {
      color: var(--red);
      font-size: 13px;
      margin-top: 12px;
      display: none;
    }

    /* ── App shell ─────────────────────────────────────── */
    #app { display: none; }

    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 28px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .header-logo {
      font-size: 18px;
      font-weight: 800;
      background: linear-gradient(135deg, #6C63FF, #9C8FFF);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .header-right { display: flex; align-items: center; gap: 16px; }
    .header-user { color: var(--text-dim); font-size: 13px; }
    #btn-logout {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-dim);
      border-radius: 10px;
      padding: 6px 14px;
      font-size: 13px;
      cursor: pointer;
      transition: border-color .2s, color .2s;
    }
    #btn-logout:hover { border-color: var(--red); color: var(--red); }

    main { max-width: 960px; margin: 0 auto; padding: 32px 24px 80px; }

    /* ── Stats ─────────────────────────────────────────── */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 12px;
      margin-bottom: 28px;
    }
    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 18px 20px;
    }
    .stat-card .stat-label { color: var(--text-dim); font-size: 12px; font-weight: 600; margin-bottom: 6px; }
    .stat-card .stat-value { font-size: 26px; font-weight: 800; }

    /* ── Toolbar ───────────────────────────────────────── */
    .toolbar {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
      align-items: center;
    }
    .search-wrap {
      flex: 1;
      position: relative;
    }
    .search-wrap input {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 11px 16px 11px 40px;
      color: var(--text);
      font-size: 14px;
      outline: none;
      transition: border-color .2s;
    }
    .search-wrap input:focus { border-color: var(--purple); }
    .search-wrap .search-icon {
      position: absolute;
      left: 13px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-faint);
      font-size: 15px;
      pointer-events: none;
    }
    .btn-icon {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text-dim);
      border-radius: 12px;
      padding: 10px 14px;
      font-size: 18px;
      cursor: pointer;
      transition: border-color .2s;
      line-height: 1;
    }
    .btn-icon:hover { border-color: var(--purple); color: var(--text); }

    /* ── Pending section ───────────────────────────────── */
    .section-title {
      font-size: 13px;
      font-weight: 700;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: .6px;
      margin-bottom: 12px;
    }
    .pending-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--orange-dim);
      border: 1px solid rgba(255,154,60,.30);
      border-radius: 20px;
      padding: 5px 12px;
      font-size: 12px;
      font-weight: 800;
      color: var(--orange);
      margin-bottom: 12px;
    }

    /* ── User cards ────────────────────────────────────── */
    .users-list { display: flex; flex-direction: column; gap: 10px; }

    .user-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 16px 20px;
      transition: border-color .2s;
    }
    .user-card.is-pro { border-color: rgba(255,215,0,.18); }
    .user-card.is-pending { border-color: rgba(255,154,60,.30); background: var(--orange-dim); }

    .card-top { display: flex; align-items: flex-start; gap: 12px; }
    .card-avatar {
      width: 40px; height: 40px; border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; font-weight: 800; flex-shrink: 0;
      background: var(--purple-dim); color: var(--purple);
    }
    .card-info { flex: 1; min-width: 0; }
    .card-name-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .card-name { font-size: 15px; font-weight: 700; }
    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 6px;
      font-size: 10px;
      font-weight: 900;
      letter-spacing: .4px;
    }
    .badge-pro   { background: var(--gold-dim);   color: var(--gold); }
    .badge-base  { background: var(--purple-dim); color: #9C8FFF; }
    .badge-admin { background: rgba(108,99,255,.18); color: #8B85FF; }
    .badge-pending { background: var(--orange-dim); color: var(--orange); }
    .card-email { color: var(--text-dim); font-size: 13px; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .card-sub   { color: var(--text-faint); font-size: 12px; margin-top: 6px; }

    .card-actions { display: flex; gap: 8px; margin-top: 14px; flex-wrap: wrap; }
    .action-btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 7px 14px; border-radius: 10px; border: 1px solid;
      font-size: 12px; font-weight: 700; cursor: pointer; background: transparent;
      transition: opacity .2s;
    }
    .action-btn:hover { opacity: .75; }
    .action-btn:disabled { opacity: .35; cursor: default; }
    .btn-grant  { color: var(--gold);   border-color: rgba(255,215,0,.30);   background: var(--gold-dim); }
    .btn-revoke { color: var(--red);    border-color: rgba(255,122,122,.30); background: var(--red-dim); }
    .btn-renew  { color: var(--green);  border-color: rgba(74,222,128,.30);  background: var(--green-dim); }
    .btn-approve { color: var(--green); border-color: rgba(74,222,128,.30);  background: var(--green-dim); }
    .btn-reject  { color: var(--red);   border-color: rgba(255,122,122,.30); background: var(--red-dim); }
    .btn-delete  { color: var(--red);   border-color: rgba(255,122,122,.20); background: transparent; margin-left: auto; }

    .spinner {
      display: inline-block;
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,.15);
      border-top-color: var(--purple);
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Empty / loading ───────────────────────────────── */
    .center-msg {
      text-align: center;
      padding: 60px 0;
      color: var(--text-faint);
      font-size: 15px;
    }

    /* ── Toast ─────────────────────────────────────────── */
    #toast {
      position: fixed;
      bottom: 28px; left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 22px;
      font-size: 14px; font-weight: 600;
      opacity: 0;
      transition: opacity .3s, transform .3s;
      pointer-events: none;
      z-index: 100;
      white-space: nowrap;
    }
    #toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    @media (max-width: 600px) {
      .stats-row { grid-template-columns: 1fr 1fr; }
      main { padding: 20px 16px 80px; }
    }
  </style>
</head>
<body>

<!-- ══ LOGIN ══════════════════════════════════════════════ -->
<div id="login-screen">
  <div class="login-card">
    <div class="logo">RunBud</div>
    <div class="subtitle">Pannello Amministratore</div>
    <input type="email" id="email-input" placeholder="Email" autocomplete="email" />
    <input type="password" id="pw-input" placeholder="Password" autocomplete="current-password" />
    <button class="btn-primary" id="btn-login">Accedi</button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<!-- ══ APP ════════════════════════════════════════════════ -->
<div id="app">
  <header>
    <div class="header-logo">RunBud Admin</div>
    <div class="header-right">
      <span class="header-user" id="header-email"></span>
      <button id="btn-logout">Esci</button>
    </div>
  </header>

  <main>
    <!-- Stats -->
    <div class="stats-row" id="stats-row">
      <div class="stat-card"><div class="stat-label">Utenti totali</div><div class="stat-value" id="stat-total">—</div></div>
      <div class="stat-card"><div class="stat-label">Piani Pro</div><div class="stat-value" id="stat-pro" style="color:var(--gold)">—</div></div>
      <div class="stat-card"><div class="stat-label">Pro (free)</div><div class="stat-value" id="stat-free" style="color:var(--green)">—</div></div>
      <div class="stat-card"><div class="stat-label">In attesa</div><div class="stat-value" id="stat-pending" style="color:var(--orange)">—</div></div>
    </div>

    <!-- Toolbar -->
    <div class="toolbar">
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input type="text" id="search-input" placeholder="Cerca per nome o email…" />
      </div>
      <button class="btn-icon" id="btn-refresh" title="Aggiorna">↻</button>
    </div>

    <!-- Pending payments -->
    <div id="pending-section" style="display:none; margin-bottom:28px;">
      <div class="pending-badge">💳 <span id="pending-count">0</span> richiesta/e di pagamento in attesa</div>
      <div class="users-list" id="pending-list"></div>
    </div>

    <!-- Users -->
    <div class="section-title">Tutti gli utenti</div>
    <div class="users-list" id="users-list">
      <div class="center-msg"><div class="spinner" style="width:24px;height:24px;margin:0 auto 12px;"></div>Caricamento…</div>
    </div>
  </main>
</div>

<div id="toast"></div>

<!-- ══ FIREBASE SDK ═══════════════════════════════════════ -->
<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
import {
  getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged
} from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js';
import {
  getFirestore, collection, getDocs, doc, setDoc, updateDoc, deleteDoc,
  writeBatch, query, orderBy, where, serverTimestamp
} from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';

// ── Firebase init ────────────────────────────────────────
const app = initializeApp({
  apiKey:            'AIzaSyAiR7XGdI4q_ocZV6h7H1oC5_huBlVLQWk',
  authDomain:        'trainiq-c0765.firebaseapp.com',
  projectId:         'trainiq-c0765',
  storageBucket:     'trainiq-c0765.firebasestorage.app',
  messagingSenderId: '510776888848',
  appId:             '1:510776888848:web:4c73d8e930f6b27f898495',
});
const auth = getAuth(app);
const db   = getFirestore(app);

// ── State ────────────────────────────────────────────────
let allUsers = [];
let searchQ  = '';

// ── Auth guard ───────────────────────────────────────────
onAuthStateChanged(auth, async user => {
  if (!user) { showLogin(); return; }

  // Check isAdmin in Firestore
  try {
    const snap = await getDocs(query(collection(db, 'users'), where('email', '==', user.email)));
    const data = snap.docs[0]?.data();
    if (!data?.isAdmin) {
      await signOut(auth);
      showLoginError('Accesso non autorizzato.');
      return;
    }
  } catch(e) { /* allow if check fails — Firestore rules will enforce */ }

  document.getElementById('header-email').textContent = user.email;
  showApp();
  loadUsers();
});

// ── Login ────────────────────────────────────────────────
document.getElementById('btn-login').addEventListener('click', async () => {
  const email = document.getElementById('email-input').value.trim();
  const pw    = document.getElementById('pw-input').value;
  const btn   = document.getElementById('btn-login');
  if (!email || !pw) return;
  btn.disabled = true;
  btn.textContent = 'Accesso…';
  hideLoginError();
  try {
    await signInWithEmailAndPassword(auth, email, pw);
  } catch(e) {
    showLoginError(friendlyAuthError(e.code));
    btn.disabled = false;
    btn.textContent = 'Accedi';
  }
});

document.getElementById('pw-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('btn-login').click();
});

document.getElementById('btn-logout').addEventListener('click', () => signOut(auth));

// ── Load users ───────────────────────────────────────────
document.getElementById('btn-refresh').addEventListener('click', loadUsers);
document.getElementById('search-input').addEventListener('input', e => {
  searchQ = e.target.value.toLowerCase();
  renderUsers();
});

async function loadUsers() {
  document.getElementById('users-list').innerHTML =
    '<div class="center-msg"><div class="spinner" style="width:24px;height:24px;margin:0 auto 12px;"></div>Caricamento…</div>';
  document.getElementById('btn-refresh').textContent = '↻';

  try {
    let snap;
    try {
      snap = await getDocs(query(collection(db, 'users'), orderBy('updatedAt', 'desc')));
    } catch {
      snap = await getDocs(collection(db, 'users'));
    }
    allUsers = snap.docs.map(d => ({ uid: d.id, ...d.data() }));
    updateStats();
    renderUsers();
    renderPending();
  } catch(e) {
    document.getElementById('users-list').innerHTML =
      `<div class="center-msg">Errore nel caricamento: ${e.message}</div>`;
  }
}

// ── Stats ────────────────────────────────────────────────
function updateStats() {
  const total   = allUsers.length;
  const pro     = allUsers.filter(u => u.subscriptionPlan === 'pro').length;
  const free    = allUsers.filter(u => u.subscriptionPlan === 'pro' && u.adminGranted).length;
  const pending = allUsers.filter(u => u.pendingPayment).length;
  document.getElementById('stat-total').textContent   = total;
  document.getElementById('stat-pro').textContent     = pro;
  document.getElementById('stat-free').textContent    = free;
  document.getElementById('stat-pending').textContent = pending;
}

// ── Render pending ───────────────────────────────────────
function renderPending() {
  const pending = allUsers.filter(u => u.pendingPayment);
  const section = document.getElementById('pending-section');
  const list    = document.getElementById('pending-list');
  document.getElementById('pending-count').textContent = pending.length;
  if (pending.length === 0) { section.style.display = 'none'; return; }
  section.style.display = 'block';
  list.innerHTML = pending.map(u => buildPendingCard(u)).join('');
  attachCardListeners(list);
}

// ── Render users ─────────────────────────────────────────
function renderUsers() {
  const filtered = allUsers.filter(u => {
    if (!searchQ) return true;
    return (u.email || '').toLowerCase().includes(searchQ) ||
           (u.name  || '').toLowerCase().includes(searchQ);
  });
  const list = document.getElementById('users-list');
  if (filtered.length === 0) {
    list.innerHTML = `<div class="center-msg">${searchQ ? 'Nessun risultato per "'+searchQ+'"' : 'Nessun utente trovato'}</div>`;
    return;
  }
  list.innerHTML = filtered.map(u => buildUserCard(u)).join('');
  attachCardListeners(list);
}

// ── Card builders ─────────────────────────────────────────
function buildPendingCard(u) {
  const name  = esc(u.name || '—');
  const email = esc(u.email || 'Email non disponibile');
  const ago   = timeAgo(u.paymentRequestedAt);
  return `
  <div class="user-card is-pending" data-uid="${u.uid}">
    <div class="card-top">
      <div class="card-avatar">💳</div>
      <div class="card-info">
        <div class="card-name-row">
          <span class="card-name">${name}</span>
          <span class="badge badge-pending">PAGAMENTO</span>
        </div>
        <div class="card-email">${email}</div>
        <div class="card-sub">Richiesta ${ago} · Verifica €9,99 su PayPal prima di approvare</div>
      </div>
    </div>
    <div class="card-actions">
      <button class="action-btn btn-approve" data-action="approve" data-uid="${u.uid}">✓ Attiva Pro 1 mese</button>
      <button class="action-btn btn-reject"  data-action="reject"  data-uid="${u.uid}">✕ Rifiuta</button>
    </div>
  </div>`;
}

function buildUserCard(u) {
  const uid    = u.uid;
  const name   = esc(u.name || '—');
  const email  = esc(u.email || 'Email non disponibile');
  const isPro  = u.subscriptionPlan === 'pro';
  const isAdm  = u.isAdmin === true;
  const adGrant= u.adminGranted === true;
  const initials = (u.name || '?')[0].toUpperCase();

  let subLabel;
  if (isPro && adGrant)       subLabel = '🎁 Pro gratuito (concesso dall\'admin)';
  else if (isPro && u.proUntil) subLabel = `Pro fino al ${formatDate(u.proUntil)}${u.pendingDowngrade ? ' · <span style="color:var(--orange)">downgrade in attesa</span>' : ''}`;
  else if (isPro)              subLabel = 'Pro';
  else                         subLabel = 'Piano Base';

  const actions = [];
  if (!isPro) {
    actions.push(`<button class="action-btn btn-grant" data-action="grant" data-uid="${uid}">⭐ Attiva Pro (gratis)</button>`);
    actions.push(`<button class="action-btn btn-approve" data-action="grant-paid" data-uid="${uid}">💳 Attiva Pro 1 mese</button>`);
  } else {
    actions.push(`<button class="action-btn btn-revoke" data-action="revoke" data-uid="${uid}">✕ Revoca Pro</button>`);
    if (!adGrant)
      actions.push(`<button class="action-btn btn-renew" data-action="renew" data-uid="${uid}" data-until="${u.proUntil||''}">↻ Rinnova +1 mese</button>`);
  }
  if (!isAdm) {
    actions.push(`<button class="action-btn btn-delete" data-action="delete" data-uid="${uid}" data-name="${name}">🗑 Elimina</button>`);
  }

  return `
  <div class="user-card ${isPro ? 'is-pro' : ''}" data-uid="${uid}">
    <div class="card-top">
      <div class="card-avatar">${initials}</div>
      <div class="card-info">
        <div class="card-name-row">
          <span class="card-name">${name}</span>
          <span class="badge ${isPro ? 'badge-pro' : 'badge-base'}">${isPro ? 'PRO' : 'BASE'}</span>
          ${isAdm ? '<span class="badge badge-admin">ADMIN</span>' : ''}
        </div>
        <div class="card-email">${email}</div>
        <div class="card-sub">${subLabel}</div>
      </div>
    </div>
    <div class="card-actions">${actions.join('')}</div>
  </div>`;
}

// ── Attach button listeners ──────────────────────────────
function attachCardListeners(container) {
  container.querySelectorAll('[data-action]').forEach(btn => {
    btn.addEventListener('click', () => handleAction(btn));
  });
}

async function handleAction(btn) {
  const action = btn.dataset.action;
  const uid    = btn.dataset.uid;

  // Conferma eliminazione prima di procedere
  if (action === 'delete') {
    const name = btn.dataset.name || uid;
    if (!confirm(`Eliminare i dati Firestore di "${name}"?\n\nRicorda di eliminare anche l'account da Firebase Authentication Console.`)) return;
  }

  const card   = document.querySelector(`[data-uid="${uid}"]`);
  const btns   = card?.querySelectorAll('button');
  btns?.forEach(b => b.disabled = true);
  const orig = btn.innerHTML;
  btn.innerHTML = '<span class="spinner"></span>';

  try {
    switch(action) {
      case 'grant':      await grantPro(uid, true);  break;
      case 'grant-paid': await grantPro(uid, false); break;
      case 'approve':    await approvePayment(uid);  break;
      case 'reject':     await rejectPayment(uid);   break;
      case 'revoke':     await revokePro(uid);       break;
      case 'renew':      await renewPro(uid, btn.dataset.until); break;
      case 'delete':     await deleteUser(uid); break;
    }
    await loadUsers();
    showToast(action === 'delete' ? '🗑 Utente eliminato da Firestore' : '✅ Operazione completata');
  } catch(e) {
    showToast('❌ Errore: ' + e.message, true);
    btns?.forEach(b => b.disabled = false);
    btn.innerHTML = orig;
  }
}

// ── Firestore actions ─────────────────────────────────────
async function grantPro(uid, adminGranted) {
  const proUntil = adminGranted ? null : addMonths(new Date(), 1).toISOString();
  await setDoc(doc(db, 'users', uid), {
    subscriptionPlan: 'pro',
    adminGranted,
    proSince: new Date().toISOString(),
    proUntil,
    pendingDowngrade: false,
    pendingPayment: false,
    paymentRequestedAt: null,
    updatedAt: serverTimestamp(),
  }, { merge: true });
}

async function approvePayment(uid) {
  await grantPro(uid, false);
}

async function rejectPayment(uid) {
  await updateDoc(doc(db, 'users', uid), {
    pendingPayment: false,
    paymentRequestedAt: null,
    updatedAt: serverTimestamp(),
  });
}

async function revokePro(uid) {
  await setDoc(doc(db, 'users', uid), {
    subscriptionPlan: 'base',
    adminGranted: false,
    proSince: null,
    proUntil: null,
    pendingDowngrade: false,
    updatedAt: serverTimestamp(),
  }, { merge: true });
}

async function deleteUser(uid) {
  const userRef = doc(db, 'users', uid);
  // Elimina la sottocollection workouts
  const workoutsSnap = await getDocs(collection(db, 'users', uid, 'workouts'));
  const batch = writeBatch(db);
  workoutsSnap.docs.forEach(d => batch.delete(d.ref));
  batch.delete(userRef);
  await batch.commit();
}

async function renewPro(uid, currentUntil) {
  const base = currentUntil ? new Date(currentUntil) : new Date();
  const newUntil = addMonths(base, 1).toISOString();
  await updateDoc(doc(db, 'users', uid), {
    proUntil: newUntil,
    pendingDowngrade: false,
    updatedAt: serverTimestamp(),
  });
}

// ── Helpers ───────────────────────────────────────────────
function addMonths(date, n) {
  const d = new Date(date);
  d.setMonth(d.getMonth() + n);
  return d;
}

function formatDate(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  return `${d.getDate().toString().padStart(2,'0')}/${(d.getMonth()+1).toString().padStart(2,'0')}/${d.getFullYear()}`;
}

function timeAgo(iso) {
  if (!iso) return '';
  const diff = Date.now() - new Date(iso).getTime();
  const min = Math.floor(diff / 60000);
  if (min < 60)  return `${min} min fa`;
  const h = Math.floor(min / 60);
  if (h < 24)    return `${h}h fa`;
  return `${Math.floor(h/24)}g fa`;
}

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function friendlyAuthError(code) {
  if (code === 'auth/wrong-password' || code === 'auth/invalid-credential') return 'Email o password errata.';
  if (code === 'auth/user-not-found') return 'Nessun account con questa email.';
  if (code === 'auth/too-many-requests') return 'Troppi tentativi. Riprova tra qualche minuto.';
  return 'Errore di accesso. Riprova.';
}

// ── UI helpers ────────────────────────────────────────────
function showLogin() {
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
  document.getElementById('btn-login').disabled = false;
  document.getElementById('btn-login').textContent = 'Accedi';
}

function showApp() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
}

function showLoginError(msg) {
  const el = document.getElementById('login-error');
  el.textContent = msg;
  el.style.display = 'block';
}

function hideLoginError() {
  document.getElementById('login-error').style.display = 'none';
}

let toastTimer;
function showToast(msg, isError = false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.color = isError ? 'var(--red)' : 'var(--green)';
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 3000);
}
